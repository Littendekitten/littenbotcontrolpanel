<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OIO LittenBot Controller</title>
    <style>
        body {
            background-color: #FFDE4D; /* Lekker vrolijk geel */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }
        h1 {
            color: #333;
            font-size: 2.2rem;
            margin: 10px 0;
        }
        .grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            flex-grow: 1;
            justify-content: center;
        }
        button {
            background-color: #ffffff;
            border: 4px solid #333;
            border-radius: 25px;
            padding: 20px;
            font-size: 1.8rem;
            font-weight: bold;
            color: #333;
            box-shadow: 0 8px 0 #333;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        button:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #333;
        }
        /* Verschillende kleurtjes voor de knoppen van Lorelei */
        .btn-dans { background-color: #FF6B6B; color: white; }
        .btn-papa { background-color: #4D96FF; color: white; }
        .btn-mama { background-color: #6BCB77; color: white; }
        .btn-rug { background-color: #B983FF; color: white; }
    </style>
</head>
<body>

    <h1>🤖 LittenBot van OIO! 🤖</h1>
    
    <div class="grid">
        <button class="btn-dans" onclick="stuur('dans')">💃 Robotdans!</button>
        <button class="btn-papa" onclick="stuur('papa')">👨 Naar Papa</button>
        <button class="btn-mama" onclick="stuur('mama')">👩 Naar Mama</button>
        <button class="btn-rug" onclick="stuur('rug')">🦖 Op je rug!</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
        import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-database.js";

        // Jouw unieke Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyB5wRKFeQCXalqe61weyHDo6hq9THA6UT8",
            authDomain: "littenbot-app.firebaseapp.com",
            databaseURL: "https://littenbot-app-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "littenbot-app",
            storageBucket: "littenbot-app.firebasestorage.app",
            messagingSenderId: "156579405931",
            appId: "1:156579405931:web:fcb2c86a7f80a9acf4912e",
            measurementId: "G-L33K1EKJZC"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Functie om commando naar de database te sturen
        window.stuur = function(actie) {
            set(ref(db, 'littenbot/commando'), {
                actie: actie,
                tijd: Date.now() // Zorgt dat de database merkt dat er opnieuw geklikt is
            });
        };
    </script>
</body>
</html>
